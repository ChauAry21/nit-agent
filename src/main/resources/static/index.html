<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<label class="theme-switch">
    <span class="theme-label" id="themeLabel">Light</span>
    <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
    <span class="theme-slider"></span>
</label>

<div class="layout">
    <div class="left">
        <div class="left-header">
            <div class="wordmark">
                <div class="wordmark-dot" id="statusDot"></div>
                Nit
            </div>
            <div class="tagline">// automated code review agent</div>
        </div>

        <div class="mode-tabs">
            <button class="mode-tab active" id="tabReview" onclick="switchMode('review')">Review</button>
            <button class="mode-tab" id="tabTests" onclick="switchMode('tests')">Generate Tests</button>
        </div>

        <div class="input-section">
            <div class="input-label" id="inputLabel">Repository path</div>
            <textarea class="path-field" id="pathInput" rows="3" placeholder="C:\Users\you\Projects\my-repo"></textarea>

            <div class="input-mode-toggle" id="inputModeToggle" style="display:none">
                <button class="toggle-btn active" id="toggleRepo" onclick="setInputMode('repo')">Repo</button>
                <button class="toggle-btn" id="toggleFile" onclick="setInputMode('file')">Single file</button>
            </div>

            <div class="input-label model-label">Model mode</div>
            <div class="input-mode-toggle">
                <button class="toggle-btn" id="toggleFast" onclick="setModelMode('fast')">Fast</button>
                <button class="toggle-btn active" id="toggleThinking" onclick="setModelMode('thinking')">Thinking</button>
            </div>

            <div class="run-row">
                <button class="run-btn" id="runBtn" onclick="run()">Run review</button>
                <span class="run-hint" id="runHint">↵ to run</span>
            </div>
        </div>

        <div class="activity-section">
            <div class="section-label">Activity</div>
            <div class="activity-empty" id="activityEmpty">Waiting...</div>
            <div class="activity-list" id="activityList"></div>
        </div>
    </div>

    <div class="right">
        <div class="right-header">
            <span class="right-header-label" id="outputLabel">Output</span>
            <span class="status-pill" id="statusPill">Idle</span>
        </div>

        <div class="review-pane" id="reviewPane">
            <div class="empty" id="emptyState">
                <div class="empty-headline" id="emptyHeadline">Code review,<br><em>without the noise.</em></div>
                <div class="empty-steps" id="emptySteps">
                    <div class="empty-step"><span class="step-num">01</span><span>Paste a local repository path on the left</span></div>
                    <div class="empty-step"><span class="step-num">02</span><span>Nit reads your files, runs git diff, and scans for issues</span></div>
                    <div class="empty-step"><span class="step-num">03</span><span>A structured review appears here in real time</span></div>
                </div>
            </div>

            <div class="review-body" id="reviewBody" style="display:none"></div>
            <div class="test-output" id="testOutput" style="display:none"></div>
        </div>
    </div>
</div>

<script>
    const ICONS = {
        list_files: '<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
        read_file: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
        git_diff: '<circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/>',
        grep: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
        generate_tests: '<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>'
    };

    let mode = 'review';
    let inputMode = 'repo';
    let modelMode = 'thinking';
    let reviewBuffer = '';
    let activityThinkingEl = null;
    let outputThinkingEl = null;
    let theme = localStorage.getItem('nit-theme') || 'light';

    function applyTheme(value) {
        theme = value;
        document.body.classList.toggle('dark', value === 'dark');
        document.getElementById('themeToggle').checked = value === 'dark';
        document.getElementById('themeLabel').textContent = value === 'dark' ? 'Dark' : 'Light';
        localStorage.setItem('nit-theme', value);
    }

    function toggleTheme() {
        const checked = document.getElementById('themeToggle').checked;
        applyTheme(checked ? 'dark' : 'light');
    }

    applyTheme(theme);

    function switchMode(m) {
        mode = m;
        document.getElementById('tabReview').className = 'mode-tab' + (m === 'review' ? ' active' : '');
        document.getElementById('tabTests').className = 'mode-tab' + (m === 'tests' ? ' active' : '');
        document.getElementById('inputModeToggle').style.display = m === 'tests' ? 'flex' : 'none';
        document.getElementById('inputLabel').textContent = m === 'review' ? 'Repository path' : (inputMode === 'repo' ? 'Repository path' : 'File path');
        document.getElementById('pathInput').placeholder = m === 'review' ? 'C:\\Users\\you\\Projects\\my-repo' : (inputMode === 'repo' ? 'C:\\Users\\you\\Projects\\my-repo' : 'C:\\Users\\you\\Projects\\my-repo\\src\\App.js');
        document.getElementById('runBtn').textContent = m === 'review' ? 'Run review' : 'Generate tests';
        document.getElementById('emptyHeadline').innerHTML = m === 'review' ? 'Code review,<br><em>without the noise.</em>' : 'Test generation,<br><em>for any language.</em>';
        document.getElementById('emptySteps').innerHTML = m === 'review'
            ? `<div class="empty-step"><span class="step-num">01</span><span>Paste a local repository path</span></div>
               <div class="empty-step"><span class="step-num">02</span><span>Nit reads your files, runs git diff, and scans for issues</span></div>
               <div class="empty-step"><span class="step-num">03</span><span>A structured review appears here in real time</span></div>`
            : `<div class="empty-step"><span class="step-num">01</span><span>Paste a repo path or a single file path</span></div>
               <div class="empty-step"><span class="step-num">02</span><span>Nit detects the language and picks the right framework</span></div>
               <div class="empty-step"><span class="step-num">03</span><span>Tests are written to disk with a quality summary</span></div>`;
        reset();
    }

    function setInputMode(m) {
        inputMode = m;
        document.getElementById('toggleRepo').className = 'toggle-btn' + (m === 'repo' ? ' active' : '');
        document.getElementById('toggleFile').className = 'toggle-btn' + (m === 'file' ? ' active' : '');
        document.getElementById('inputLabel').textContent = m === 'repo' ? 'Repository path' : 'File path';
        document.getElementById('pathInput').placeholder = m === 'repo' ? 'C:\\Users\\you\\Projects\\my-repo' : 'C:\\Users\\you\\Projects\\my-repo\\src\\App.js';
    }

    function setModelMode(m) {
        modelMode = m;
        document.getElementById('toggleFast').className = 'toggle-btn' + (m === 'fast' ? ' active' : '');
        document.getElementById('toggleThinking').className = 'toggle-btn' + (m === 'thinking' ? ' active' : '');
    }

    function reset() {
        hideThinking();
        activityThinkingEl = null;
        outputThinkingEl = null;
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('reviewBody').style.display = 'none';
        document.getElementById('reviewBody').innerHTML = '';
        document.getElementById('testOutput').style.display = 'none';
        document.getElementById('testOutput').innerHTML = '';
        document.getElementById('activityList').innerHTML = '';
        document.getElementById('activityEmpty').style.display = 'block';
        document.getElementById('activityEmpty').textContent = 'Waiting...';
        reviewBuffer = '';
    }

    function setStatus(state) {
        const dot = document.getElementById('statusDot');
        const pill = document.getElementById('statusPill');
        dot.className = 'wordmark-dot' + (state === 'running' ? ' live' : '');
        pill.className = 'status-pill' + (state !== 'idle' ? ' ' + state : '');
        pill.textContent = { idle: 'Idle', running: 'Running', done: 'Done', error: 'Error' }[state] || state;
    }

    function getActiveOutputContainer() {
        const reviewBody = document.getElementById('reviewBody');
        const testOutput = document.getElementById('testOutput');

        if (reviewBody.style.display !== 'none') return reviewBody;
        if (testOutput.style.display !== 'none') return testOutput;
        return null;
    }

    function showThinking() {
        const activityList = document.getElementById('activityList');
        const activitySection = document.querySelector('.activity-section');
        const reviewPane = document.getElementById('reviewPane');
        const outputContainer = getActiveOutputContainer();

        document.getElementById('activityEmpty').style.display = 'none';

        if (!activityThinkingEl || !activityThinkingEl.isConnected) {
            activityThinkingEl = document.createElement('div');
            activityThinkingEl.className = 'activity-thinking';
            activityThinkingEl.innerHTML = `<div class="thinking-dots"><span></span><span></span><span></span></div><span class="thinking-label">Nit is thinking...</span>`;
            activityList.appendChild(activityThinkingEl);
        }

        if (outputContainer && (!outputThinkingEl || !outputThinkingEl.isConnected)) {
            outputThinkingEl = document.createElement('div');
            outputThinkingEl.className = 'test-thinking';
            outputThinkingEl.innerHTML = `<div class="thinking-dots"><span></span><span></span><span></span></div><span>thinking...</span>`;
            outputContainer.appendChild(outputThinkingEl);
        }

        if (activitySection) activitySection.scrollTop = activitySection.scrollHeight;
        if (reviewPane) reviewPane.scrollTop = reviewPane.scrollHeight;
    }

    function hideThinking() {
        if (activityThinkingEl) {
            activityThinkingEl.remove();
            activityThinkingEl = null;
        }

        if (outputThinkingEl) {
            outputThinkingEl.remove();
            outputThinkingEl = null;
        }
    }

    function addActivity(name, args) {
        hideThinking();
        document.getElementById('activityEmpty').style.display = 'none';

        const icon = ICONS[name] || '<circle cx="12" cy="12" r="3"/>';
        const item = document.createElement('div');

        item.className = 'activity-item';
        item.innerHTML = `<div class="activity-icon"><svg viewBox="0 0 24 24">${icon}</svg></div><div class="activity-body"><div class="activity-tool">${name}</div><div class="activity-args">${esc(args)}</div></div>`;

        const list = document.getElementById('activityList');
        list.appendChild(item);

        const activitySection = document.querySelector('.activity-section');
        if (activitySection) activitySection.scrollTop = activitySection.scrollHeight;
    }

    function addTestLine(text, cls) {
        hideThinking();

        const out = document.getElementById('testOutput');
        const line = document.createElement('div');

        line.className = 'test-line ' + (cls || '');
        line.textContent = text;

        out.appendChild(line);

        const reviewPane = document.getElementById('reviewPane');
        if (reviewPane) reviewPane.scrollTop = reviewPane.scrollHeight;
    }

    function renderSummary(raw) {
        hideThinking();

        const parts = {};
        raw.replace('[summary]', '').trim().split('|').forEach(p => {
            const kv = p.trim().split(':');
            if (kv.length >= 2) parts[kv[0].trim()] = kv.slice(1).join(':').trim();
        });

        const files = parts.files || '0';
        const success = parts.success || '0';
        const errors = parts.errors || '0';
        const clean = parts.clean || '0/0';
        const avgIter = parts.avg_iterations || '1.0';

        const out = document.getElementById('testOutput');
        const summary = document.createElement('div');

        summary.className = 'test-summary';
        summary.innerHTML = `
            <div class="test-summary-title">Generation Summary</div>
            <div class="test-summary-stats">
                <div class="stat"><span class="stat-value">${files}</span><span class="stat-label">Files found</span></div>
                <div class="stat"><span class="stat-value good">${success}</span><span class="stat-label">Tests written</span></div>
                <div class="stat"><span class="stat-value ${parseInt(errors) > 0 ? 'warn' : ''}">${errors}</span><span class="stat-label">Errors</span></div>
                <div class="stat"><span class="stat-value">${clean}</span><span class="stat-label">Clean on critique</span></div>
                <div class="stat"><span class="stat-value">${avgIter}</span><span class="stat-label">Avg iterations</span></div>
            </div>`;

        out.appendChild(summary);

        const reviewPane = document.getElementById('reviewPane');
        if (reviewPane) reviewPane.scrollTop = reviewPane.scrollHeight;
    }

    function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderMarkdown(text) {
        let html = text
            .replace(/^#{1,3}\s+(.+)$/gm, '<h3>$1</h3>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/`([^`\n]+)`/g, '<code>$1</code>')
            .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
            .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
            .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
            .split('\n')
            .map(l => {
                if (/^<(h3|ul|li)/.test(l)) return l;
                if (!l.trim()) return '';
                return `<p>${l}</p>`;
            })
            .join('');

        const m = html.match(/(\d+)\/10/);

        if (m) {
            html = html.replace(/(\d+)\/10/, `<div class="rating-block"><span class="rating-num">${m[1]}</span><span class="rating-denom">/10</span></div>`);
        }

        return html;
    }

    function run() {
        const path = document.getElementById('pathInput').value.trim();
        if (!path) return;

        hideThinking();
        activityThinkingEl = null;
        outputThinkingEl = null;
        reviewBuffer = '';

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('activityList').innerHTML = '';
        document.getElementById('activityEmpty').style.display = 'block';
        document.getElementById('activityEmpty').textContent = 'Starting...';
        document.getElementById('runBtn').disabled = true;
        document.getElementById('runHint').textContent = 'running...';

        setStatus('running');

        if (mode === 'review') {
            document.getElementById('reviewBody').style.display = 'block';
            document.getElementById('reviewBody').innerHTML = '';
            document.getElementById('testOutput').style.display = 'none';
            document.getElementById('testOutput').innerHTML = '';
            streamReview(path);
        } else {
            document.getElementById('testOutput').style.display = 'block';
            document.getElementById('testOutput').innerHTML = '';
            document.getElementById('reviewBody').style.display = 'none';
            document.getElementById('reviewBody').innerHTML = '';
            streamTests(path);
        }
    }

    function streamReview(path) {
        fetch(`/review?modelMode=${modelMode}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(path)
        }).then(res => {
            const reader = res.body.getReader();
            const dec = new TextDecoder();

            function read() {
                reader.read().then(({ done, value }) => {
                    if (done) {
                        hideThinking();
                        document.getElementById('reviewBody').innerHTML = renderMarkdown(reviewBuffer);
                        document.getElementById('runBtn').disabled = false;
                        document.getElementById('runHint').textContent = '↵ to run';
                        setStatus('done');
                        return;
                    }

                    for (const line of dec.decode(value, { stream: true }).split('\n')) {
                        if (!line.startsWith('data:')) continue;

                        const data = line.slice(5).trim();
                        if (!data) continue;

                        if (data === '[thinking]') {
                            showThinking();
                        } else if (data === '[thinking_done]') {
                            hideThinking();
                        } else if (data.startsWith('[tool]')) {
                            hideThinking();

                            const m = data.match(/\[tool\]\s+(\S+)\s*(.*)/s);
                            if (m) addActivity(m[1], m[2].trim());
                        } else if (!data.startsWith('Starting review')) {
                            reviewBuffer += data + '\n';
                        }
                    }

                    read();
                });
            }

            read();
        }).catch(() => {
            hideThinking();
            setStatus('error');
            document.getElementById('runBtn').disabled = false;
            document.getElementById('runHint').textContent = '↵ to run';
        });
    }

    function streamTests(path) {
        const isRepo = inputMode === 'repo';

        fetch(`/generate-tests?isRepo=${isRepo}&modelMode=${modelMode}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(path)
        }).then(res => {
            const reader = res.body.getReader();
            const dec = new TextDecoder();

            function read() {
                reader.read().then(({ done, value }) => {
                    if (done) {
                        hideThinking();
                        document.getElementById('runBtn').disabled = false;
                        document.getElementById('runHint').textContent = '↵ to run';
                        setStatus('done');
                        return;
                    }

                    for (const line of dec.decode(value, { stream: true }).split('\n')) {
                        if (!line.startsWith('data:')) continue;

                        const data = line.slice(5).trim();
                        if (!data) continue;

                        if (data === '[thinking]') {
                            showThinking();
                        } else if (data === '[thinking_done]') {
                            hideThinking();
                        } else if (data.startsWith('[summary]')) {
                            renderSummary(data);
                        } else if (data.startsWith('[generating]')) {
                            addActivity('generate_tests', data.replace('[generating]', '').trim());
                            addTestLine(data, 'generating');
                        } else if (data.startsWith('[done]')) {
                            addTestLine(data, 'done');
                        } else if (data.startsWith('Error') || data.startsWith('Failed')) {
                            addTestLine(data, 'error');
                        } else {
                            addTestLine(data);
                        }
                    }

                    read();
                });
            }

            read();
        }).catch(() => {
            hideThinking();
            setStatus('error');
            document.getElementById('runBtn').disabled = false;
            document.getElementById('runHint').textContent = '↵ to run';
        });
    }

    document.getElementById('pathInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            run();
        }
    });
</script>
</body>
</html>
